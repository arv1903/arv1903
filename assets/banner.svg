<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#111820"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentVert" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0f6fc"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#21262d" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <pattern id="dotGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#30363d" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Subtle grid overlay -->
  <rect width="1200" height="280" fill="url(#grid)"/>

  <!-- Dot grid in upper right area -->
  <rect x="700" y="0" width="500" height="280" fill="url(#dotGrid)"/>

  <!-- Accent line - horizontal -->
  <line x1="0" y1="279" x2="1200" y2="279" stroke="url(#accent)" stroke-width="1.5"/>

  <!-- Top accent line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="url(#accent)" stroke-width="1"/>

  <!-- Geometric accent - left side vertical bar -->
  <rect x="80" y="70" width="3" height="140" rx="1.5" fill="url(#accentVert)"/>

  <!-- Geometric accent - small diamond -->
  <polygon points="780,140 790,130 800,140 790,150" fill="#3b82f6" opacity="0.5"/>
  <polygon points="780,200 790,190 800,200 790,210" fill="#6366f1" opacity="0.25"/>

  <!-- Geometric accent - angular lines right side -->
  <line x1="1060" y1="120" x2="1090" y2="90" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="1090" y1="90" x2="1120" y2="120" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="1120" y1="120" x2="1090" y2="150" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="1090" y1="150" x2="1060" y2="120" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>

  <!-- Subtle diagonal architectural lines -->
  <line x1="200" y1="260" x2="350" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="220" y1="260" x2="370" y2="200" stroke="#21262d" stroke-width="0.5"/>

  <!-- Corner bracket top-left -->
  <path d="M 50 30 L 50 20 L 70 20" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>

  <!-- Corner bracket bottom-right -->
  <path d="M 1130 260 L 1150 260 L 1150 240" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>

  <!-- Name -->
  <text x="110" y="130" font-family="'Segoe UI', -apple-system, sans-serif" font-size="40" font-weight="600" fill="url(#textGrad)" letter-spacing="-0.5">
    Marvin Alvianus Rainhard
  </text>

  <!-- Subtitle -->
  <text x="112" y="175" font-family="'Segoe UI', -apple-system, sans-serif" font-size="16" font-weight="400" fill="#8b949e" letter-spacing="1.5">
    COMPUTER SCIENCE STUDENT
  </text>

  <!-- Subtitle secondary -->
  <text x="112" y="200" font-family="'Segoe UI', -apple-system, sans-serif" font-size="14" font-weight="300" fill="#6e7681" letter-spacing="0.5">
    Full-Stack Developer &amp; BCA Scholarship Awardee
  </text>

  <!-- Small hash decoration lines near subtitle -->
  <line x1="430" y1="202" x2="440" y2="192" stroke="#30363d" stroke-width="0.5"/>
  <line x1="440" y1="192" x2="450" y2="202" stroke="#30363d" stroke-width="0.5"/>
  <line x1="450" y1="202" x2="460" y2="192" stroke="#30363d" stroke-width="0.5"/>

  <!-- Bottom subtle text -->
  <text x="112" y="245" font-family="'Courier New', monospace" font-size="11" fill="#30363d" letter-spacing="1">
    github.com/arv1903
  </text>
</svg>
